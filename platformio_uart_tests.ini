[platformio]
include_dir = include
lib_dir = lib

[env:test_teensy_uart_scope]
platform = teensy
board = teensy41
framework = arduino
monitor_speed = 115200
build_src_filter =
    -<*>
    +<tests/uart_link_scope/teensy_uart_scope_test.cpp>

[env:test_esp32s3_uart_scope]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600
board_build.flash_mode = qio
board_build.partitions = huge_app.csv
board_build.psram_type = opi
board_build.arduino.memory_type = qio_opi
board_upload.flash_size = 8MB
board_build.flash_size = 8MB
build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
build_src_filter =
    -<*>
    +<tests/uart_link_scope/esp32s3_uart_scope_test.cpp>
